[files]
extend-exclude = [
    "*.pbxproj",
    "*.xcworkspace/",
    "__Snapshots__/",
]

[default.extend-words]
# typos splits "PNGs" and flags "PN" as a typo for "ON"
PN = "PN"
UDID = "UDID"
mappin = "mappin"
# CBAttributePermissions.writeable is the Apple API spelling
writeable = "writeable"
