# GitLab CI for vauchi-ios
#
# iOS app (SwiftUI)
#
# Performance optimizations:
#   - Change-based rules: Jobs run only when relevant files change
#   - Timeouts: Prevent runaway jobs from blocking runners
#   - Interruptible: Auto-cancel on new commits
#
# Pipeline strategy:
#   - MR: Full validation (lint, build, test, security)
#   - Tag: Release build + TestFlight upload
#   - Scheduled: Security scans
#   Main branch is protected and merge-only. All validation happens
#   during the MR pipeline; post-merge pipelines are unnecessary.
#
# Requirements:
#   - macOS runner with Xcode and SwiftLint
#
# Native bindings:
#   Consumed from vauchi-mobile-swift via Swift Package Manager.
#   The vauchi/core release pipeline builds UniFFI bindings, packages an
#   XCFramework, and publishes it. vauchi-mobile-swift wraps this as an
#   SPM binary target that this app depends on.
#
# GitLab Ultimate Features:
#   - SAST: Static application security testing (Swift)
#   - Secret Detection: Prevent credential leaks

# GitLab Ultimate Templates + shared timeout definitions
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/timeouts.yml'
      - '/ci-templates/reuse.yml'

stages:
  - auto-tag
  - update
  - lint
  - build
  - test
  - security
  - deploy

# Override: serialize reuse-lint with other lint jobs on macOS shell executor
reuse-lint:
  tags: [macos, self-hosted]
  variables:
    GIT_DEPTH: "20"
  needs: []

variables:
  # GitLab Ultimate Security Configuration
  SAST_EXCLUDED_PATHS: "build/, DerivedData/, Pods/"
  SECRET_DETECTION_EXCLUDED_PATHS: "build/, DerivedData/, Pods/"

  # Enable Swift SAST analyzer
  SAST_ANALYZER_IMAGE_TAG: "5"

# Interruptible default for auto-cancel
default:
  interruptible: true

workflow:
  auto_cancel:
    on_new_commit: interruptible

# Timeout templates provided by vauchi/scripts ci-templates/timeouts.yml

.macos-job:
  tags:
    - macos
    - self-hosted
  variables:
    GIT_DEPTH: "20"
  before_script:
    - |
      if ! xcrun simctl list runtimes 2>/dev/null | grep -q "iOS.*SimRuntime"; then
        echo "ERROR: iOS Simulator runtime is not installed."
        echo "Run on the runner machine: xcodebuild -downloadPlatform iOS"
        exit 1
      fi

# Cache SPM packages and DerivedData between pipeline runs.
# This avoids re-downloading and re-compiling all dependencies on every job,
# which is the primary source of slow iOS CI builds (PI-01).
.spm-cache:
  cache:
    key: ios-spm-${CI_COMMIT_REF_SLUG}
    fallback_keys:
      - ios-spm-${CI_DEFAULT_BRANCH}
      - ios-spm
    paths:
      - .spm-packages/
    policy: pull-push

# Read-only SPM cache for jobs that don't need to update it
.spm-cache-readonly:
  cache:
    key: ios-spm-${CI_COMMIT_REF_SLUG}
    fallback_keys:
      - ios-spm-${CI_DEFAULT_BRANCH}
      - ios-spm
    paths:
      - .spm-packages/
    policy: pull

# ============================================================
# Auto-Tag Stage
# ============================================================

# When MARKETING_VERSION is bumped and merged to main,
# automatically create a v{version} tag to trigger the release pipeline.
auto-tag:version:
  stage: auto-tag
  image: alpine:latest
  needs: []
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: "1"
  script:
    - apk add --no-cache git
    - |
      VERSION=$(grep 'MARKETING_VERSION' project.yml | sed 's/.*"\(.*\)"/\1/')
      TAG="v${VERSION}"
      echo "project.yml MARKETING_VERSION: ${VERSION}"
      echo "Expected tag: ${TAG}"

      # Check if tag already exists
      if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
        echo "✓ Tag ${TAG} already exists — nothing to do"
        exit 0
      fi

      echo "Tag ${TAG} does not exist — creating it..."

      git config user.name "vauchi-gitlab-runner"
      git config user.email "noreply@vauchi.app"

      # Use project access token for push — CI_JOB_TOKEN cannot be used here
      # because pushes via CI_JOB_TOKEN do not trigger new pipelines, and the
      # tag push must trigger the release pipeline (build:release stage).
      # PROJECT_ACCESS_TOKEN is set at group level in Settings > CI/CD > Variables.
      git remote set-url origin "https://vauchi-gitlab-runner:${PROJECT_ACCESS_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"

      git tag -a "${TAG}" -m "Release ${TAG}"
      git push origin "${TAG}"
      echo "✓ Created and pushed tag ${TAG}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================================
# Update Stage (triggered by upstream distribution repo)
# ============================================================

# Automatically bump vauchi-mobile-swift dependency and create MR
update:bindings-version:
  stage: update
  tags:
    - macos
    - self-hosted
  resource_group: bindings-version-update
  rules:
    - if: ($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "api") && $BINDINGS_VERSION
  script:
    - |
      # Strip v prefix if present (upstream trigger passes v0.1.16 format)
      BINDINGS_VERSION="${BINDINGS_VERSION#v}"
      echo "Bumping vauchi-mobile-swift to $BINDINGS_VERSION"

      BRANCH="chore/bump-vauchi-mobile-${BINDINGS_VERSION}"

      # Configure git
      git config user.email "ci@vauchi.com"
      git config user.name "Vauchi CI"
      git remote set-url origin "https://ci:${PROJECT_ACCESS_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"

      # Check if branch already exists on remote
      if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
        echo "Branch $BRANCH already exists — version bump already in progress"
        exit 0
      fi

      # Create branch and update version in project.yml
      git checkout -b "$BRANCH"
      # Only update VauchiMobile version (not other SPM deps like SnapshotTesting)
      LINE=$(grep -n "vauchi-mobile-swift" project.yml | head -1 | cut -d: -f1)
      NEXT=$((LINE + 1))
      sed -i "" "${NEXT}s/from: \"[^\"]*\"/from: \"${BINDINGS_VERSION}\"/" project.yml

      # Verify the change was made
      if ! grep -q "from: \"${BINDINGS_VERSION}\"" project.yml; then
        echo "ERROR: Version replacement failed"
        exit 1
      fi

      # Regenerate Xcode project
      command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
      xcodegen generate

      git add project.yml Vauchi.xcodeproj/
      git commit -m "chore: Bump vauchi-mobile-swift to $BINDINGS_VERSION"
      git push -u origin "$BRANCH"

      # Create MR via GitLab API
      MR_RESPONSE=$(curl -s --request POST \
        --header "PRIVATE-TOKEN: ${PROJECT_ACCESS_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"source_branch\": \"$BRANCH\",
          \"target_branch\": \"main\",
          \"title\": \"chore: Bump vauchi-mobile-swift to $BINDINGS_VERSION\",
          \"description\": \"Automated version bump triggered by vauchi-mobile-swift release.\\n\\nUpdates VauchiMobile SPM minimum version to \`$BINDINGS_VERSION\`.\\n\\n---\\n_This MR was created automatically by CI._\",
          \"remove_source_branch\": true
        }" \
        "${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/merge_requests")

      MR_IID=$(echo "$MR_RESPONSE" | jq -r '.iid // empty')
      MR_URL=$(echo "$MR_RESPONSE" | jq -r '.web_url // empty')
      if [ -n "$MR_URL" ] && [ -n "$MR_IID" ]; then
        echo "Created MR: $MR_URL"

        # Enable auto-merge so the MR merges automatically when CI passes
        echo "Enabling auto-merge..."
        MERGE_RESPONSE=$(curl -s --request PUT \
          --header "PRIVATE-TOKEN: ${PROJECT_ACCESS_TOKEN}" \
          "${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/merge_requests/${MR_IID}/merge?merge_when_pipeline_succeeds=true")
        MERGE_STATUS=$(echo "$MERGE_RESPONSE" | jq -r '.merge_when_pipeline_succeeds // empty')
        if [ "$MERGE_STATUS" = "true" ]; then
          echo "Auto-merge enabled — MR will merge when pipeline succeeds"
        else
          echo "WARNING: Could not enable auto-merge (may require maintainer token)"
          echo "  Response: $(echo "$MERGE_RESPONSE" | jq -r '.message // .error // "unknown"')"
        fi
      else
        echo "MR creation response: $MR_RESPONSE"
        echo "WARNING: Could not create MR (may already exist)"
      fi

# ============================================================
# Lint Stage (MR only, change-based)
# ============================================================

lint:swiftlint:
  extends: [.macos-job, .timeout-quick]
  stage: lint
  needs: [reuse-lint]  # sequential: prevents shell executor git races
  script:
    - |
      if command -v swiftlint &> /dev/null; then
        echo "SwiftLint version: $(swiftlint version)"
        swiftlint lint --strict --config .swiftlint.yml --reporter codeclimate > swiftlint-report.json || true
        swiftlint lint --strict --config .swiftlint.yml
      else
        echo "SwiftLint not installed — skipping lint"
      fi
  artifacts:
    reports:
      codequality: swiftlint-report.json
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.swift"
          - ".swiftlint.yml"
          - ".gitlab-ci.yml"

lint:swiftformat:
  extends: [.macos-job, .timeout-quick]
  stage: lint
  needs:
    - job: lint:swiftlint
      optional: true  # may be excluded by change-based rules
  script:
    - if command -v swiftformat &> /dev/null; then swiftformat --lint .; else echo "SwiftFormat not installed, skipping"; fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.swift"
          - ".swiftformat"
          - ".gitlab-ci.yml"

lint:xcodegen:
  extends: .macos-job
  stage: lint
  needs:
    - job: lint:swiftformat
      optional: true  # may be excluded by change-based rules
  before_script:
    - command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
  script:
    - xcodegen generate
    - |
      if git diff --quiet Vauchi.xcodeproj/; then
        echo "Xcode project is up to date"
      else
        echo "Xcode project is out of date — committing regenerated project"
        git config user.email "ci@vauchi.com"
        git config user.name "Vauchi CI"
        git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
        git add Vauchi.xcodeproj/
        git commit -m "chore: Regenerate Xcode project via xcodegen"
        git push origin HEAD:"${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - project.yml
          - "Vauchi/**/*.swift"

# ============================================================
# Build Stage (MR: debug, Tag: release)
# ============================================================

build:debug:
  extends: [.macos-job, .spm-cache, .timeout-extended]
  stage: build
  script:
    # Clear DerivedData and all SPM state (shell executor persists files between runs)
    - rm -rf "${HOME}/Library/Developer/Xcode/DerivedData"
    - rm -rf "${HOME}/Library/Caches/org.swift.swiftpm/repositories"
    - rm -rf .spm-packages
    - xcodegen generate
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Debug -destination 'generic/platform=iOS Simulator' -clonedSourcePackagesDirPath .spm-packages ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING=NO build
  artifacts:
    paths:
      - build/Build/Products/Debug-iphonesimulator/
      - Vauchi.xcodeproj/
      - .spm-packages/
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.swift"
          - "**/*.xib"
          - "**/*.storyboard"
          - "*.xcodeproj/**/*"
          - "Package.swift"
          - "project.yml"
          - ".gitlab-ci.yml"

build:release:
  extends: [.macos-job, .spm-cache, .timeout-extended]
  stage: build
  script:
    # Release builds start clean for reproducibility
    - rm -rf "${HOME}/Library/Developer/Xcode/DerivedData"
    - ./scripts/setup-signing.sh
    - xcodegen generate
    - xcodebuild archive
        -project Vauchi.xcodeproj
        -scheme Vauchi
        -configuration Release
        -archivePath build/Vauchi.xcarchive
        -clonedSourcePackagesDirPath .spm-packages
        -allowProvisioningUpdates
        -authenticationKeyPath "private_keys/AuthKey_${ASC_KEY_ID}.p8"
        -authenticationKeyID "$ASC_KEY_ID"
        -authenticationKeyIssuerID "$ASC_ISSUER_ID"
        ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING=NO
  after_script:
    - ./scripts/teardown-signing.sh
  artifacts:
    paths:
      - build/Vauchi.xcarchive
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ============================================================
# Test Stage (MR only, change-based)
# ============================================================

test:unit:
  extends: [.macos-job, .spm-cache-readonly, .timeout-long]
  stage: test
  needs:
    - job: build:debug
      artifacts: true
  script:
    # Reuse build:debug artifacts (.spm-packages, Vauchi.xcodeproj)
    # Skip xcodegen — project was already generated by build:debug
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 17 Pro' -clonedSourcePackagesDirPath .spm-packages ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING=NO test -skip-testing VauchiSnapshotTests -skip-testing VauchiUITests -parallel-testing-enabled YES -parallel-testing-worker-count 4 -resultBundlePath build/test_result.xcresult
    - command -v xcresultparser >/dev/null 2>&1 || brew install a7ex/formulae/xcresultparser
    - mkdir -p build/reports
    - xcresultparser --output-format junit build/test_result.xcresult > build/reports/junit.xml
  artifacts:
    reports:
      junit: build/reports/junit.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.swift"
          - "*.xcodeproj/**/*"
          - "project.yml"
          - ".gitlab-ci.yml"

coverage:unit:
  extends: [.macos-job, .spm-cache-readonly, .timeout-long]
  stage: test
  needs:
    - job: build:debug
      artifacts: true
      optional: true
  before_script:
    - command -v xcresultparser >/dev/null 2>&1 || brew install a7ex/formulae/xcresultparser
  script:
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 17 Pro' -clonedSourcePackagesDirPath .spm-packages ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING=NO test -enableCodeCoverage YES -resultBundlePath coverage_result -skip-testing VauchiSnapshotTests -skip-testing VauchiUITests -parallel-testing-enabled YES -parallel-testing-worker-count 4
    - xcrun xccov view --report coverage_result.xcresult
    - xcresultparser --output-format cobertura coverage_result.xcresult > cobertura.xml
    - |
      curl --silent --fail \
        "${CI_API_V4_URL}/projects/vauchi%2Fscripts/repository/files/scripts%2Fci%2Fpush-coverage.sh/raw?ref=main" \
        -o push-coverage.sh
      chmod +x push-coverage.sh
    - ./push-coverage.sh cobertura.xml ios || true
  coverage: '/(?:line coverage:|Coverage:)\s*(\d+(?:\.\d+)?%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: cobertura.xml
    paths:
      - cobertura.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "api"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

# Visual regression snapshot tests (swift-snapshot-testing)
# Captures reference images for all SwiftUI views and compares against baselines.
# NOTE: Baselines must be generated locally first by running with isRecording = true.
# Allowed to fail until initial baselines are committed.
test:snapshots:
  extends: [.macos-job, .spm-cache-readonly, .timeout-long]
  stage: test
  needs:
    - job: test:unit
      artifacts: false
    - job: build:debug
      artifacts: true
  allow_failure: true
  script:
    # Reuse build:debug artifacts — skip xcodegen + SPM fetch
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 17 Pro' -clonedSourcePackagesDirPath .spm-packages ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING=NO test -only-testing VauchiSnapshotTests
  artifacts:
    when: on_failure
    paths:
      - VauchiSnapshotTests/__Snapshots__/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.swift"
          - "*.xcodeproj/**/*"
          - "project.yml"
          - ".gitlab-ci.yml"

# ============================================================
# Security Stage (MR + scheduled)
# ============================================================

# GitLab security templates configuration
# Override child analyzer jobs (not parent stubs) to add tags and rules

semgrep-sast:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.swift"
          - ".gitlab-ci.yml"
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"

# Swift-specific security analysis
security:swift-analysis:
  extends: [.macos-job, .timeout-quick]
  stage: security
  needs:
    - job: test:snapshots
      optional: true
      artifacts: false
    - job: test:unit
      optional: true
      artifacts: false
  script:
    # Check for common iOS security issues
    - 'grep -r "NSAllowsArbitraryLoads" . && echo "WARNING: App Transport Security disabled" || true'
    - 'grep -r "allowsBackup.*true" . && echo "WARNING: Backup enabled" || true'
    - 'grep -r "NSCameraUsageDescription\|NSPhotoLibraryUsageDescription\|NSLocationWhenInUseUsageDescription" Info.plist || echo "INFO: No privacy permissions declared"'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.plist"
          - ".gitlab-ci.yml"

# Dependency check for CocoaPods/SPM (runs on dependency changes)
security:dependencies:
  extends: [.macos-job, .timeout-quick]
  stage: security
  needs:
    - job: security:swift-analysis
      optional: true
      artifacts: false
  script:
    - |
      if [ -f "Podfile.lock" ]; then
        echo "Checking CocoaPods dependencies..."
        pod outdated || true
      fi
    - |
      if [ -f "Package.resolved" ]; then
        echo "Checking Swift Package dependencies..."
        swift package show-dependencies || true
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "Podfile*"
          - "project.yml"
          - "Package.resolved"
          - ".gitlab-ci.yml"

# ============================================================
# Deploy Stage (Tag only — upload to TestFlight)
# ============================================================

deploy:testflight:
  extends: [.macos-job, .timeout-extended]
  stage: deploy
  interruptible: false
  needs:
    - job: build:release
      artifacts: true
  script:
    - ./scripts/setup-signing.sh
    # Export IPA from archive
    - xcodebuild -exportArchive
        -archivePath build/Vauchi.xcarchive
        -exportOptionsPlist ExportOptions.plist
        -exportPath build/export
        -allowProvisioningUpdates
        -authenticationKeyPath "private_keys/AuthKey_${ASC_KEY_ID}.p8"
        -authenticationKeyID "$ASC_KEY_ID"
        -authenticationKeyIssuerID "$ASC_ISSUER_ID"
    # Upload to TestFlight
    - xcrun altool --upload-app
        -f build/export/Vauchi.ipa
        -t ios
        --apiKey "$ASC_KEY_ID"
        --apiIssuer "$ASC_ISSUER_ID"
  after_script:
    - ./scripts/teardown-signing.sh
  artifacts:
    paths:
      - build/export/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
