# GitLab CI for vauchi-ios
#
# iOS app (SwiftUI)
#
# Performance optimizations:
#   - Change-based rules: Jobs run only when relevant files change
#   - Timeouts: Prevent runaway jobs from blocking runners
#   - Interruptible: Auto-cancel on new commits
#
# Pipeline strategy:
#   - MR: Full validation (lint, build, test, security)
#   - Tag: Release build + TestFlight upload
#   - Scheduled: Security scans
#   Main branch is protected and merge-only. All validation happens
#   during the MR pipeline; post-merge pipelines are unnecessary.
#
# Requirements:
#   - macOS runner with Xcode and SwiftLint
#
# Native bindings:
#   Consumed from vauchi-platform-swift via Swift Package Manager.
#   The vauchi/core release pipeline builds UniFFI bindings, packages an
#   XCFramework, and publishes it. vauchi-platform-swift wraps this as an
#   SPM binary target that this app depends on.
#
# GitLab Ultimate Features:
#   - SAST: Static application security testing (Swift)
#   - Secret Detection: Prevent credential leaks

# GitLab Ultimate Templates + shared timeout definitions
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/timeouts.yml'
      - '/ci-templates/reuse.yml'
      - '/ci-templates/design-drift.yml'
      - '/ci-templates/image-lint.yml'
      - '/ci-templates/removed-symbols.yml'
      - '/ci-templates/badges.yml'
      - '/ci-templates/github-mirror.yml'

stages:
  - auto-tag
  - update
  - lint
  - build
  - test
  - security
  - deploy

# Override: serialize lint:reuse with other lint jobs on macOS shell executor
lint:reuse:
  stage: lint
  tags: [macos, self-hosted]
  variables:
    GIT_DEPTH: "20"
  needs: []
  timeout: 2m
  script:
    - reuse lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

variables:
  # GitLab Ultimate Security Configuration
  SAST_EXCLUDED_PATHS: "build/, DerivedData/, Pods/"
  SECRET_DETECTION_EXCLUDED_PATHS: "build/, DerivedData/, Pods/"

  # Enable Swift SAST analyzer
  SAST_ANALYZER_IMAGE_TAG: "5"

# Interruptible default for auto-cancel
default:
  interruptible: true

workflow:
  auto_cancel:
    on_new_commit: interruptible

# Timeout templates provided by vauchi/scripts ci-templates/timeouts.yml

.macos-job:
  tags:
    - macos
    - self-hosted
  # Serialize all SPM-using jobs on the shared macOS runner.
  # Multiple concurrent xcodebuild -resolvePackageDependencies deadlock
  # on SPM's global package cache (~/.cache/org.swift.swiftpm/).
  # Runner concurrent=1 is the primary fix; this is defense-in-depth.
  resource_group: ios-spm
  variables:
    GIT_DEPTH: "20"
  before_script:
    - echo "Xcode $(xcodebuild -version | head -1)"
    # Self-healing: remove stale keychain entries for gitlab.com.
    # Duplicate/locked entries cause SPM binary target downloads to
    # crash with "fatalError" (post-mortem 2026-03-28).
    - security delete-internet-password -s gitlab.com 2>/dev/null || true
    - |
      if ! xcrun simctl list runtimes 2>/dev/null | grep -q "iOS.*SimRuntime"; then
        echo "ERROR: iOS Simulator runtime is not installed."
        echo "Run on the runner machine: xcodebuild -downloadPlatform iOS"
        exit 1
      fi

# Simulator serialization — prevents "Busy / preflight checks" failures.
# 1. resource_group: only one simulator job runs at a time (across pipelines)
# 2. Erase: wipes installed apps, keychain, and settings — gives xcodebuild
#    a clean simulator with no stale app bundles or SpringBoard state.
#    (shutdown+boot alone does NOT erase disk state — installed apps survive
#    reboots and cause "Application failed preflight checks" on next launch.)
.simulator-job:
  resource_group: ios-simulator
  before_script:
    - !reference [.macos-job, before_script]
    - xcrun simctl shutdown all 2>/dev/null || true
    - xcrun simctl erase all
  after_script:
    - xcrun simctl shutdown all 2>/dev/null || true

# Cache SPM packages and DerivedData between pipeline runs.
# This avoids re-downloading and re-compiling all dependencies on every job,
# which is the primary source of slow iOS CI builds (PI-01).
.spm-cache:
  cache:
    key: ios-spm-${CI_COMMIT_REF_SLUG}
    fallback_keys:
      - ios-spm-${CI_DEFAULT_BRANCH}
      - ios-spm
    paths:
      - .spm-packages/
    policy: pull-push

# Read-only SPM cache for jobs that don't need to update it
.spm-cache-readonly:
  cache:
    key: ios-spm-${CI_COMMIT_REF_SLUG}
    fallback_keys:
      - ios-spm-${CI_DEFAULT_BRANCH}
      - ios-spm
    paths:
      - .spm-packages/
    policy: pull

# ============================================================
# Auto-Tag Stage
# ============================================================

# When MARKETING_VERSION is bumped and merged to main,
# automatically create a v{version} tag to trigger the release pipeline.
auto-tag:version:
  stage: auto-tag
  image: alpine:3.21
  tags: [docker]
  resource_group: auto-tag
  needs: []
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: "1"
  script:
    - apk add --no-cache git
    - |
      VERSION=$(grep 'MARKETING_VERSION' project.yml | sed 's/.*"\(.*\)"/\1/')
      TAG="v${VERSION}"
      echo "project.yml MARKETING_VERSION: ${VERSION}"
      echo "Expected tag: ${TAG}"

      # Check if tag already exists
      if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
        echo "✓ Tag ${TAG} already exists — nothing to do"
        exit 0
      fi

      echo "Tag ${TAG} does not exist — creating it..."

      # NOTE: GITLAB_USER_EMAIL is safe here — auto-tag runs on same-repo
      # push (user's own email is verified). Cross-repo triggers use the
      # API-discovered bot email in update:bindings-version instead.
      git config user.name "${GITLAB_USER_NAME}"
      git config user.email "${GITLAB_USER_EMAIL}"

      # Use project access token for push — CI_JOB_TOKEN cannot be used here
      # because pushes via CI_JOB_TOKEN do not trigger new pipelines, and the
      # tag push must trigger the release pipeline (build:release stage).
      # PROJECT_ACCESS_TOKEN is set at group level in Settings > CI/CD > Variables.
      git remote set-url origin "https://vauchi-gitlab-runner:${PROJECT_ACCESS_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"

      git tag -a "${TAG}" -m "Release ${TAG}"
      git push origin "${TAG}"
      echo "✓ Created and pushed tag ${TAG}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================================
# Update Stage (triggered by upstream distribution repo)
# ============================================================

# Automatically bump vauchi-platform-swift dependency and create MR
update:bindings-version:
  stage: update
  tags:
    - macos
    - self-hosted
  resource_group: bindings-version-update
  rules:
    - if: ($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "api") && $BINDINGS_VERSION
  script:
    - |
      # Strip v prefix if present (upstream trigger passes v0.1.16 format)
      BINDINGS_VERSION="${BINDINGS_VERSION#v}"
      echo "Bumping vauchi-platform-swift to $BINDINGS_VERSION"

      BRANCH="chore/bump-vauchi-platform-${BINDINGS_VERSION}"

      # Configure git — use PROJECT_ACCESS_TOKEN for push (CI_JOB_TOKEN from
      # upstream triggers lacks write access to this repo).
      # PROJECT_ACCESS_TOKEN is set at group level in Settings > CI/CD > Variables.
      # Look up the bot's own email via API — PROJECT_ACCESS_TOKEN belongs
      # to a group bot whose noreply email is verified by GitLab. Using
      # GITLAB_USER_EMAIL fails when a human triggers the upstream pipeline
      # (their personal email isn't verified on the bot account).
      BOT_USER=$(curl -fsSL --header "PRIVATE-TOKEN: ${PROJECT_ACCESS_TOKEN}" \
        "${CI_SERVER_URL}/api/v4/user")
      BOT_EMAIL=$(echo "$BOT_USER" | jq -r '.commit_email // .email')
      BOT_NAME=$(echo "$BOT_USER" | jq -r '.name // "Vauchi CI"')
      git config user.email "$BOT_EMAIL"
      git config user.name "$BOT_NAME"
      git remote set-url origin "https://vauchi-gitlab-runner:${PROJECT_ACCESS_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"

      # Check if branch already exists on remote
      if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
        echo "Branch $BRANCH already exists — version bump already in progress"
        exit 0
      fi

      # Capture old version before updating.
      # Update VauchiPlatform dependency to exact version pin.
      # Handles: branch: main, from: "x.y.z", or version: "x.y.z"
      LINE=$(grep -n "vauchi-platform-swift" project.yml | head -1 | cut -d: -f1)
      NEXT=$((LINE + 1))
      OLD_VERSION=$(sed -n "${NEXT}p" project.yml | sed 's/.*"\(.*\)"/\1/')
      echo "Old version: $OLD_VERSION → New version: $BINDINGS_VERSION"

      # Create branch and update version in project.yml (-B force-creates
      # if stale local branch exists from a previous failed pipeline retry)
      git checkout -B "$BRANCH"
      CURRENT=$(sed -n "${NEXT}p" project.yml)
      if echo "$CURRENT" | grep -q 'branch:'; then
        sed -i "" "${NEXT}s/branch: .*/version: \"${BINDINGS_VERSION}\"/" project.yml
      elif echo "$CURRENT" | grep -q 'from:'; then
        sed -i "" "${NEXT}s/from: \"[^\"]*\"/version: \"${BINDINGS_VERSION}\"/" project.yml
      else
        sed -i "" "${NEXT}s/version: \"[^\"]*\"/version: \"${BINDINGS_VERSION}\"/" project.yml
      fi

      # Verify the change was made
      if ! grep -q "version: \"${BINDINGS_VERSION}\"" project.yml; then
        echo "ERROR: Version replacement failed"
        exit 1
      fi

      # Regenerate Xcode project
      command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
      xcodegen generate

      # --- Removed-symbol check (advisory) ---
      # Compare old and new binding source to detect removed functions.
      # If consumer code still references removed symbols, mark MR as Draft.
      REMOVED_WARNING=""
      MARK_DRAFT=false
      PLATFORM_REPO="https://gitlab.com/vauchi/vauchi-platform-swift.git"
      BINDING_PATH="Sources/VauchiPlatform/vauchi_platform.swift"

      if [ -n "$OLD_VERSION" ] && [ "$OLD_VERSION" != "$BINDINGS_VERSION" ]; then
        echo "Checking for removed symbols between $OLD_VERSION and $BINDINGS_VERSION..."
        mkdir -p /tmp/binding-check
        OLD_BINDING="/tmp/binding-check/old.swift"
        NEW_BINDING="/tmp/binding-check/new.swift"

        # Fetch binding files from both versions (shallow, single-file)
        curl -sf "${PLATFORM_REPO%.git}/-/raw/v${OLD_VERSION}/${BINDING_PATH}" > "$OLD_BINDING" 2>/dev/null || \
          curl -sf "${PLATFORM_REPO%.git}/-/raw/${OLD_VERSION}/${BINDING_PATH}" > "$OLD_BINDING" 2>/dev/null || true
        curl -sf "${PLATFORM_REPO%.git}/-/raw/v${BINDINGS_VERSION}/${BINDING_PATH}" > "$NEW_BINDING" 2>/dev/null || \
          curl -sf "${PLATFORM_REPO%.git}/-/raw/${BINDINGS_VERSION}/${BINDING_PATH}" > "$NEW_BINDING" 2>/dev/null || true

        if [ -s "$OLD_BINDING" ] && [ -s "$NEW_BINDING" ]; then
          # Extract public func/var names from each version
          grep -oE '(open |public )?func [a-zA-Z_][a-zA-Z0-9_]*' "$OLD_BINDING" | sed 's/.* //' | sort -u > /tmp/binding-check/old_funcs
          grep -oE '(open |public )?func [a-zA-Z_][a-zA-Z0-9_]*' "$NEW_BINDING" | sed 's/.* //' | sort -u > /tmp/binding-check/new_funcs

          # Find functions removed in the new version
          REMOVED_FUNCS=$(comm -23 /tmp/binding-check/old_funcs /tmp/binding-check/new_funcs)

          if [ -n "$REMOVED_FUNCS" ]; then
            echo "Removed functions: $(echo "$REMOVED_FUNCS" | tr '\n' ', ')"
            STALE_REFS=""
            while IFS= read -r func_name; do
              [ -z "$func_name" ] && continue
              # Search consumer source (excluding build artifacts and tests)
              if grep -rq "$func_name" Vauchi/ 2>/dev/null; then
                STALE_REFS="${STALE_REFS}- \`${func_name}()\` — still referenced in consumer code\n"
                echo "  STALE: $func_name found in consumer source"
              fi
            done <<< "$REMOVED_FUNCS"

            if [ -n "$STALE_REFS" ]; then
              MARK_DRAFT=true
              REMOVED_WARNING="\\n\\n⚠️ **Removed symbols still referenced in consumer code:**\\n${STALE_REFS}\\nCallsite updates are needed before this MR can merge."
              echo "WARNING: Stale callsites detected — MR will be created as Draft"
            else
              echo "No stale callsites found — all removed symbols are unused"
            fi
          else
            echo "No functions were removed in this version"
          fi
        else
          echo "Could not fetch binding files for comparison — skipping symbol check"
        fi
        rm -rf /tmp/binding-check
      fi

      git add project.yml Vauchi.xcodeproj/
      git commit -m "chore: Bump vauchi-platform-swift to $BINDINGS_VERSION"
      git push -u origin "$BRANCH"

      # Create MR via GitLab API
      MR_TITLE="chore: Bump vauchi-platform-swift to $BINDINGS_VERSION"
      if [ "$MARK_DRAFT" = "true" ]; then
        MR_TITLE="Draft: $MR_TITLE"
      fi

      MR_DESCRIPTION="Automated version bump triggered by vauchi-platform-swift release.\\n\\nUpdates VauchiPlatform SPM version to \`$BINDINGS_VERSION\` (from \`$OLD_VERSION\`).${REMOVED_WARNING}\\n\\n---\\n_This MR was created automatically by CI._"

      MR_RESPONSE=$(curl -s --request POST \
        --header "PRIVATE-TOKEN: ${PROJECT_ACCESS_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"source_branch\": \"$BRANCH\",
          \"target_branch\": \"main\",
          \"title\": \"$MR_TITLE\",
          \"description\": \"$MR_DESCRIPTION\",
          \"remove_source_branch\": true
        }" \
        "${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/merge_requests")

      MR_IID=$(echo "$MR_RESPONSE" | jq -r '.iid // empty')
      MR_URL=$(echo "$MR_RESPONSE" | jq -r '.web_url // empty')
      if [ -n "$MR_URL" ] && [ -n "$MR_IID" ]; then
        echo "Created MR: $MR_URL"

        # Only enable auto-merge if no stale callsites were detected
        if [ "$MARK_DRAFT" = "true" ]; then
          echo "Skipping auto-merge — MR created as Draft due to stale callsites"
        else
          echo "Enabling auto-merge..."
          MERGE_RESPONSE=$(curl -s --request PUT \
            --header "PRIVATE-TOKEN: ${PROJECT_ACCESS_TOKEN}" \
            "${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/merge_requests/${MR_IID}/merge?merge_when_pipeline_succeeds=true")
          MERGE_STATUS=$(echo "$MERGE_RESPONSE" | jq -r '.merge_when_pipeline_succeeds // empty')
          if [ "$MERGE_STATUS" = "true" ]; then
            echo "Auto-merge enabled — MR will merge when pipeline succeeds"
          else
            echo "WARNING: Could not enable auto-merge (may require maintainer token)"
            echo "  Response: $(echo "$MERGE_RESPONSE" | jq -r '.message // .error // "unknown"')"
          fi
        fi
      else
        echo "MR creation response: $MR_RESPONSE"
        echo "WARNING: Could not create MR (may already exist)"
      fi

# ============================================================
# Lint Stage (MR only, change-based)
# ============================================================

lint:images:
  extends: .image-lint

lint:swiftlint:
  extends: [.macos-job, .timeout-quick]
  stage: lint
  needs: [lint:reuse]  # sequential: prevents shell executor git races
  script:
    - |
      if command -v swiftlint &> /dev/null; then
        echo "SwiftLint version: $(swiftlint version)"
        swiftlint lint --strict --config .swiftlint.yml --reporter codeclimate > swiftlint-report.json || true
        swiftlint lint --strict --config .swiftlint.yml
      else
        echo "SwiftLint not installed — skipping lint"
      fi
  artifacts:
    reports:
      codequality: swiftlint-report.json
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.swift"
          - ".swiftlint.yml"
          - ".gitlab-ci.yml"

lint:swiftformat:
  extends: [.macos-job, .timeout-quick]
  stage: lint
  needs:
    - job: lint:swiftlint
      optional: true  # may be excluded by change-based rules
  script:
    - if command -v swiftformat &> /dev/null; then swiftformat --lint .; else echo "SwiftFormat not installed, skipping"; fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.swift"
          - ".swiftformat"
          - ".gitlab-ci.yml"

lint:xcodegen:
  extends: .macos-job
  stage: lint
  needs:
    - job: lint:swiftformat
      optional: true  # may be excluded by change-based rules
  before_script:
    - command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
  script:
    - xcodegen generate
    - |
      if git diff --quiet Vauchi.xcodeproj/; then
        echo "Xcode project is up to date"
      else
        echo "WARNING: Xcode project is out of date. Run 'xcodegen generate' locally and commit."
        echo "Diff:"
        git diff --stat Vauchi.xcodeproj/
        echo "(build:debug regenerates from scratch — this is advisory only)"
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - project.yml
          - "Vauchi/**/*.swift"

# Guard: block if isRecording is hardcoded instead of using environment variable
check:snapshot-recording:
  stage: lint
  extends: .macos-job
  script:
    - |
      MISSING=""
      for f in VauchiSnapshotTests/*.swift; do
        if grep -q 'var isRecording' "$f" && ! grep -q 'SNAPSHOT_TESTING_RECORD' "$f"; then
          MISSING="$MISSING $f"
        fi
      done
      if [ -n "$MISSING" ]; then
        echo "❌ isRecording property must use SNAPSHOT_TESTING_RECORD env var in:$MISSING"
        exit 1
      fi
      echo "✅ all isRecording properties use SNAPSHOT_TESTING_RECORD env var"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "VauchiSnapshotTests/**"

# Design drift: verify all design-spec components are implemented
check:design-drift:
  extends: .design-drift-job
  variables:
    DESIGN_DRIFT_COMPONENT_DIR: "Vauchi/CoreUI/Components"
    DESIGN_DRIFT_FILE_EXT: ".swift"
    DESIGN_DRIFT_CASE: "pascal"

# Removed symbols: detect stale references to removed features
check:removed-symbols:
  extends: .removed-symbols-job
  variables:
    SEARCH_DIRS: "Vauchi/"

# ============================================================
# Build Stage (MR: debug, Tag: release)
# ============================================================

build:debug:
  extends: [.macos-job, .spm-cache, .timeout-extended]
  stage: build
  script:
    - echo "── [$(date +%H:%M:%S)] xcodegen ──"
    - rm -rf Vauchi.xcodeproj
    - xcodegen generate
    # SPM resolve/build never advances branch pins — it honors Package.resolved
    # and workspace-state.json as lock files. Delete both so SPM re-resolves to
    # the latest branch tip. The cached bare repos stay warm so this is fast.
    - rm -f .spm-packages/workspace-state.json
    - rm -rf .spm-packages/artifacts/
    - rm -f Vauchi.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
    - echo "── [$(date +%H:%M:%S)] xcodebuild (SPM resolve + compile) ──"
    - |
      # Heartbeat: print elapsed time every 120s so CI log shows progress
      ( while true; do sleep 120; printf '  [build heartbeat] %s\n' "$(date +%H:%M:%S)"; done ) &
      HEARTBEAT=$!
      trap 'kill $HEARTBEAT 2>/dev/null' EXIT
      xcodebuild -project Vauchi.xcodeproj -scheme Vauchi \
        -configuration Debug \
        -destination 'generic/platform=iOS Simulator' \
        -clonedSourcePackagesDirPath .spm-packages \
        ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING=NO \
        -showBuildTimingSummary \
        build
      kill $HEARTBEAT 2>/dev/null || true
    - echo "── [$(date +%H:%M:%S)] build:debug complete ──"
  artifacts:
    paths:
      - build/Build/Products/Debug-iphonesimulator/
      - Vauchi.xcodeproj/
      - .spm-packages/
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.swift"
          - "**/*.xib"
          - "**/*.storyboard"
          - "*.xcodeproj/**/*"
          - "Package.swift"
          - "project.yml"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == "main"  # seed SPM cache for MR fallback keys

build:release:
  extends: [.macos-job, .spm-cache, .timeout-extended]
  stage: build
  script:
    # Release builds start clean for reproducibility
    - rm -rf "${HOME}/Library/Developer/Xcode/DerivedData"
    - ./scripts/setup-signing.sh
    - xcodegen generate
    # Force SPM to re-resolve branch pins to latest (see build:debug comment)
    - rm -f .spm-packages/workspace-state.json
    - rm -f Vauchi.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
    - xcodebuild archive
        -project Vauchi.xcodeproj
        -scheme Vauchi
        -configuration Release
        -archivePath build/Vauchi.xcarchive
        -clonedSourcePackagesDirPath .spm-packages
        -allowProvisioningUpdates
        -authenticationKeyPath "private_keys/AuthKey_${ASC_KEY_ID}.p8"
        -authenticationKeyID "$ASC_KEY_ID"
        -authenticationKeyIssuerID "$ASC_ISSUER_ID"
        ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING=NO
  after_script:
    - ./scripts/teardown-signing.sh
  artifacts:
    paths:
      - build/Vauchi.xcarchive
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ============================================================
# Test Stage (MR only, change-based)
# ============================================================

test:unit:
  extends: [.macos-job, .simulator-job, .spm-cache-readonly, .timeout-long]
  stage: test
  needs:
    - job: build:debug
      artifacts: true
  script:
    # Reuse build:debug artifacts (.spm-packages, Vauchi.xcodeproj)
    # Skip xcodegen — project was already generated by build:debug
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 17 Pro' -clonedSourcePackagesDirPath .spm-packages ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING=NO test -skip-testing VauchiSnapshotTests -skip-testing VauchiUITests -parallel-testing-enabled YES -parallel-testing-worker-count 4 -resultBundlePath build/test_result.xcresult
    - command -v xcresultparser >/dev/null 2>&1 || brew install a7ex/formulae/xcresultparser
    - mkdir -p build/reports
    - xcresultparser --output-format junit build/test_result.xcresult > build/reports/junit.xml
  artifacts:
    reports:
      junit: build/reports/junit.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.swift"
          - "*.xcodeproj/**/*"
          - "project.yml"
          - ".gitlab-ci.yml"

coverage:unit:
  extends: [.macos-job, .simulator-job, .spm-cache-readonly, .timeout-long]
  stage: test
  needs:
    - job: build:debug
      artifacts: true
      optional: true
  before_script:
    - !reference [.simulator-job, before_script]
    - command -v xcresultparser >/dev/null 2>&1 || brew install a7ex/formulae/xcresultparser
  script:
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 17 Pro' -clonedSourcePackagesDirPath .spm-packages ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING=NO test -enableCodeCoverage YES -resultBundlePath coverage_result -skip-testing VauchiSnapshotTests -skip-testing VauchiUITests -parallel-testing-enabled YES -parallel-testing-worker-count 4
    - xcrun xccov view --report coverage_result.xcresult
    - xcresultparser --output-format cobertura coverage_result.xcresult > cobertura.xml
    - |
      curl --silent --fail \
        "${CI_API_V4_URL}/projects/vauchi%2Fscripts/repository/files/scripts%2Fci%2Fpush-coverage.sh/raw?ref=main" \
        -o push-coverage.sh
      chmod +x push-coverage.sh
    - ./push-coverage.sh cobertura.xml ios || true
  coverage: '/Line Coverage:\s+(\d+(?:\.\d+)?%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: cobertura.xml
    paths:
      - cobertura.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "api"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

# Visual regression snapshot tests (swift-snapshot-testing)
# Captures reference images for all SwiftUI views and compares against baselines.
# Self-detecting: strict validation when baselines exist, advisory skip when missing.
test:snapshots:
  extends: [.macos-job, .simulator-job, .spm-cache-readonly, .timeout-long]
  stage: test
  needs:
    - job: test:unit
      artifacts: false
    - job: build:debug
      artifacts: true
  script:
    # Self-detecting snapshot mode (pipefail-safe: check dir exists before find)
    - |
      BASELINE_COUNT=0
      if [ -d VauchiSnapshotTests/__Snapshots__ ]; then
        BASELINE_COUNT=$(find VauchiSnapshotTests/__Snapshots__ -name '*.png' | wc -l | tr -d ' ')
      fi
    - |
      if [ "$BASELINE_COUNT" -eq 0 ]; then
        echo "⚠️  SNAPSHOT BASELINES MISSING ($BASELINE_COUNT PNGs in __Snapshots__/)"
        echo "    Use the 'Record baselines' manual job in this pipeline to generate them."
        echo "    CI is the single source of truth — do not record locally."
        echo "    Snapshot validation skipped — no baselines to compare against."
        exit 0
      fi
    - echo "✅ Found $BASELINE_COUNT snapshot baselines — running validation"
    # Reuse build:debug artifacts — skip xcodegen + SPM fetch
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 17 Pro' -clonedSourcePackagesDirPath .spm-packages ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING=NO test -only-testing VauchiSnapshotTests -parallel-testing-worker-count 1
  # allow_failure removed: resource_group serialization prevents simulator contention
  artifacts:
    when: on_failure
    paths:
      - VauchiSnapshotTests/__Snapshots__/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.swift"
          - "*.xcodeproj/**/*"
          - "project.yml"
          - ".gitlab-ci.yml"

# XCUITest accessibility tests — run on simulator, sequential (UI tests are not parallelizable)
test:ui:
  extends: [.macos-job, .simulator-job, .spm-cache-readonly, .timeout-long]
  stage: test
  needs:
    - job: test:unit
      artifacts: false
    - job: build:debug
      artifacts: true
  script:
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 17 Pro' -clonedSourcePackagesDirPath .spm-packages ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING=NO test -only-testing VauchiUITests -resultBundlePath build/ui_test_result.xcresult
    - command -v xcresultparser >/dev/null 2>&1 || brew install a7ex/formulae/xcresultparser
    - mkdir -p build/reports
    - xcresultparser --output-format junit build/ui_test_result.xcresult > build/reports/ui-junit.xml
  artifacts:
    reports:
      junit: build/reports/ui-junit.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.swift"
          - "*.xcodeproj/**/*"
          - "project.yml"
          - ".gitlab-ci.yml"

# Manual job: record snapshot baselines on CI and commit them to the branch.
# CI is the single source of truth for baselines — never record locally.
# Click "Record baselines" in the pipeline UI after pushing view changes.
test:snapshots:record:
  extends: [.macos-job, .simulator-job, .spm-cache-readonly, .timeout-long]
  stage: test
  needs:
    - job: build:debug
      artifacts: true
  when: manual
  allow_failure: true  # manual jobs should not block the pipeline
  script:
    - echo "📸 Recording snapshot baselines..."
    # SNAPSHOT_RECORD compilation condition forces isRecording=true in test binary.
    # Env vars don't reach the iOS Simulator process; build settings do.
    # Simulator cleanup handled by .simulator-job before_script/after_script.
    - |
      set +e
      xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Debug \
        -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
        -clonedSourcePackagesDirPath .spm-packages \
        ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING=NO \
        SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) SNAPSHOT_RECORD' \
        test -only-testing VauchiSnapshotTests -parallel-testing-worker-count 1 \
        2>&1 | tee /tmp/xcodebuild-record.log
      XCODE_EXIT=$?
      set -e
      # Verify tests actually executed (not just a simulator launch failure)
      if ! grep -q "Executed.*test" /tmp/xcodebuild-record.log; then
        echo "❌ Tests never executed — infrastructure failure (simulator crash?)"
        echo "   Check runner health: xcrun simctl list devices"
        tail -20 /tmp/xcodebuild-record.log
        exit 1
      fi
      echo "✅ Tests executed (exit code ${XCODE_EXIT} is expected in record mode)"
    # Preserve recorded snapshots across git checkout
    - cp -r VauchiSnapshotTests/__Snapshots__/ /tmp/__Snapshots__/
    # Switch from detached merge-ref HEAD to the actual branch.
    # CI_JOB_TOKEN auth is auto-configured by GitLab (insteadOf rewrite).
    # Push permissions enabled via project setting (ci_push_repository_for_job_token_allowed).
    # NOTE: GITLAB_USER_EMAIL is safe here — snapshot register pushes to
    # the same repo via CI_JOB_TOKEN (user's own email is verified).
    - git config user.name "${GITLAB_USER_NAME}"
    - git config user.email "${GITLAB_USER_EMAIL}"
    - git fetch origin "+refs/heads/${CI_COMMIT_REF_NAME}:refs/heads/${CI_COMMIT_REF_NAME}"
    - git checkout "${CI_COMMIT_REF_NAME}"
    # Restore recorded snapshots (git checkout resets working directory)
    - cp -r /tmp/__Snapshots__/ VauchiSnapshotTests/__Snapshots__/
    # Commit and push baselines (skip if unchanged)
    - |
      git add VauchiSnapshotTests/__Snapshots__/
      if git diff --cached --quiet; then
        echo "✅ No baseline changes — nothing to commit"
        exit 0
      fi
      CHANGED=$(git diff --cached --stat | tail -1)
      git commit -m "chore: record snapshot baselines [ci]

      ${CHANGED}

      Recorded-By: CI job #${CI_JOB_ID}"
      git push origin HEAD:${CI_COMMIT_REF_NAME}
      echo "✅ Baselines committed and pushed"
      echo "   NOTE: CI_JOB_TOKEN pushes do not trigger pipelines."
      echo "   Push any change or run 'glab ci create' to validate baselines."
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.swift"
          - "*.xcodeproj/**/*"
          - "project.yml"
          - ".gitlab-ci.yml"

# ============================================================
# Security Stage (MR + scheduled)
# ============================================================

# GitLab security templates configuration
# Override child analyzer jobs (not parent stubs) to add tags and rules

semgrep-sast:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.swift"
          - ".gitlab-ci.yml"
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"

# Swift-specific security analysis
security:swift-analysis:
  extends: [.macos-job, .timeout-quick]
  stage: security
  needs:
    - job: test:snapshots
      optional: true
      artifacts: false
    - job: test:unit
      optional: true
      artifacts: false
  script:
    # Check for common iOS security issues
    - 'grep -r "NSAllowsArbitraryLoads" . && echo "WARNING: App Transport Security disabled" || true'
    - 'grep -r "allowsBackup.*true" . && echo "WARNING: Backup enabled" || true'
    - 'grep -r "NSCameraUsageDescription\|NSPhotoLibraryUsageDescription\|NSLocationWhenInUseUsageDescription" Info.plist || echo "INFO: No privacy permissions declared"'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.plist"
          - ".gitlab-ci.yml"

# Dependency check for CocoaPods/SPM (runs on dependency changes)
security:dependencies:
  extends: [.macos-job, .timeout-quick]
  stage: security
  needs:
    - job: security:swift-analysis
      optional: true
      artifacts: false
  script:
    - |
      if [ -f "Podfile.lock" ]; then
        echo "Checking CocoaPods dependencies..."
        pod outdated || true
      fi
    - |
      if [ -f "Package.resolved" ]; then
        echo "Checking Swift Package dependencies..."
        swift package show-dependencies || true
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "Podfile*"
          - "project.yml"
          - "Package.resolved"
          - ".gitlab-ci.yml"

# ============================================================
# Deploy Stage (Tag only — upload to TestFlight)
# ============================================================

deploy:testflight:
  extends: [.macos-job, .timeout-extended]
  stage: deploy
  interruptible: false
  needs:
    - job: build:release
      artifacts: true
  script:
    - ./scripts/setup-signing.sh
    # Export IPA from archive
    - xcodebuild -exportArchive
        -archivePath build/Vauchi.xcarchive
        -exportOptionsPlist ExportOptions.plist
        -exportPath build/export
        -allowProvisioningUpdates
        -authenticationKeyPath "private_keys/AuthKey_${ASC_KEY_ID}.p8"
        -authenticationKeyID "$ASC_KEY_ID"
        -authenticationKeyIssuerID "$ASC_ISSUER_ID"
    # Upload to TestFlight
    - xcrun altool --upload-app
        -f build/export/Vauchi.ipa
        -t ios
        --apiKey "$ASC_KEY_ID"
        --apiIssuer "$ASC_ISSUER_ID"
  after_script:
    - ./scripts/teardown-signing.sh
  artifacts:
    paths:
      - build/export/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages

github-mirror:
  extends: .github-mirror
  variables:
    GITHUB_MIRROR_LFS_INCLUDE: "*.a"
