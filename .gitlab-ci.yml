# GitLab CI for vauchi-ios
#
# iOS app (SwiftUI)
#
# GitLab Ultimate Features:
#   - SAST: Static application security testing (Swift)
#   - Secret Detection: Prevent credential leaks
#   - Mobile App Security Testing (MAST)
#
# REMEDIATION PLAN (allow_failure jobs):
# All jobs require a macOS runner with Xcode, which may not be configured.
# Additionally, the app requires native UniFFI bindings from vauchi-mobile.
#
# To fix:
# 1. Configure a macOS GitLab runner with tag 'macos'
#    - Install Xcode and command line tools
#    - Install SwiftLint: brew install swiftlint
# 2. Build native bindings before Xcode build:
#    - Run: ./build-ios.sh (builds vauchi-mobile for iOS targets)
# 3. Or use pre-built XCFramework from vauchi/core CI artifacts
#
# Once macOS runner is available and bindings are built, remove `allow_failure: true`

# GitLab Ultimate Templates
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - lint
  - build
  - test
  - security

variables:
  # GitLab Ultimate Security Configuration
  SAST_EXCLUDED_PATHS: "build/, DerivedData/, Pods/"
  SECRET_DETECTION_EXCLUDED_PATHS: "build/, DerivedData/, Pods/"

  # Enable Swift SAST analyzer
  SAST_ANALYZER_IMAGE_TAG: "5"

.macos-job:
  tags:
    - macos
    - self-hosted
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================================
# Lint Stage
# ============================================================

lint:swiftlint:
  extends: .macos-job
  stage: lint
  script:
    - if command -v swiftlint &> /dev/null; then swiftlint lint --strict --reporter json > swiftlint-report.json || true; fi
    - if command -v swiftlint &> /dev/null; then swiftlint lint --strict; fi
  artifacts:
    reports:
      codequality: swiftlint-report.json
    expire_in: 1 week
  allow_failure: true

lint:swiftformat:
  extends: .macos-job
  stage: lint
  script:
    - if command -v swiftformat &> /dev/null; then swiftformat --lint .; else echo "SwiftFormat not installed, skipping"; fi
  allow_failure: true

# ============================================================
# Build Stage
# ============================================================

build:debug:
  extends: .macos-job
  stage: build
  script:
    - ./build-ios.sh || echo "Native bindings build skipped"
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Debug -destination 'generic/platform=iOS Simulator' build
  artifacts:
    paths:
      - build/Build/Products/Debug-iphonesimulator/
    expire_in: 1 week
  allow_failure: true

build:release:
  extends: .macos-job
  stage: build
  script:
    - ./build-ios.sh || echo "Native bindings build skipped"
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Release -destination 'generic/platform=iOS Simulator' build
  artifacts:
    paths:
      - build/Build/Products/Release-iphonesimulator/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  allow_failure: true

# ============================================================
# Test Stage
# ============================================================

test:unit:
  extends: .macos-job
  stage: test
  script:
    - xcodebuild -project Vauchi.xcodeproj -scheme VauchiTests -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 15 Pro' test
  artifacts:
    reports:
      junit: build/reports/junit.xml
    expire_in: 1 week
  allow_failure: true

# ============================================================
# Security Stage
# ============================================================

# GitLab security templates configuration
# Override child analyzer jobs (not parent stubs) to add tags and rules

semgrep-sast:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"


# Swift-specific security analysis
security:swift-analysis:
  extends: .macos-job
  stage: security
  script:
    # Check for common iOS security issues
    - 'grep -r "NSAllowsArbitraryLoads" . && echo "WARNING: App Transport Security disabled" || true'
    - 'grep -r "allowsBackup.*true" . && echo "WARNING: Backup enabled" || true'
    - 'grep -r "NSCameraUsageDescription\|NSPhotoLibraryUsageDescription\|NSLocationWhenInUseUsageDescription" Info.plist || echo "INFO: No privacy permissions declared"'
  allow_failure: true

# Dependency check for CocoaPods/SPM
security:dependencies:
  extends: .macos-job
  stage: security
  script:
    - |
      if [ -f "Podfile.lock" ]; then
        echo "Checking CocoaPods dependencies..."
        pod outdated || true
      fi
    - |
      if [ -f "Package.resolved" ]; then
        echo "Checking Swift Package dependencies..."
        swift package show-dependencies || true
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "Podfile*"
        - "Package.swift"
        - "Package.resolved"
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true
