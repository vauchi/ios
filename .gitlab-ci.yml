# GitLab CI for vauchi-ios
#
# iOS app (SwiftUI)
#
# Pipeline strategy:
#   - MR: Full validation (lint, build, test, security)
#   - Main: Build validation
#
# Requirements:
#   - macOS runner with Xcode and SwiftLint
#
# Native bindings:
#   Consumed from vauchi-mobile-swift via Swift Package Manager.
#   The vauchi/core release pipeline builds UniFFI bindings, packages an
#   XCFramework, and publishes it. vauchi-mobile-swift wraps this as an
#   SPM binary target that this app depends on.
#
# GitLab Ultimate Features:
#   - SAST: Static application security testing (Swift)
#   - Secret Detection: Prevent credential leaks

# GitLab Ultimate Templates
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - lint
  - build
  - test
  - security

variables:
  # GitLab Ultimate Security Configuration
  SAST_EXCLUDED_PATHS: "build/, DerivedData/, Pods/"
  SECRET_DETECTION_EXCLUDED_PATHS: "build/, DerivedData/, Pods/"

  # Enable Swift SAST analyzer
  SAST_ANALYZER_IMAGE_TAG: "5"

.macos-job:
  tags:
    - macos
    - self-hosted
  before_script:
    - |
      if ! xcrun simctl list runtimes 2>/dev/null | grep -q "iOS.*SimRuntime"; then
        echo "ERROR: iOS Simulator runtime is not installed."
        echo "Run on the runner machine: xcodebuild -downloadPlatform iOS"
        exit 1
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ============================================================
# Lint Stage
# ============================================================

lint:swiftlint:
  extends: .macos-job
  stage: lint
  script:
    - if command -v swiftlint &> /dev/null; then swiftlint lint --strict --reporter json > swiftlint-report.json || true; fi
    - if command -v swiftlint &> /dev/null; then swiftlint lint --strict; fi
  artifacts:
    reports:
      codequality: swiftlint-report.json
    expire_in: 1 week

lint:swiftformat:
  extends: .macos-job
  stage: lint
  script:
    - if command -v swiftformat &> /dev/null; then swiftformat --lint .; else echo "SwiftFormat not installed, skipping"; fi

lint:xcodegen:
  extends: .macos-job
  stage: lint
  script:
    - xcodegen generate
    - git diff --exit-code Vauchi.xcodeproj/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - project.yml

# ============================================================
# Build Stage
# ============================================================

build:debug:
  extends: .macos-job
  stage: build
  script:
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Debug -destination 'generic/platform=iOS Simulator' -clonedSourcePackagesDirPath .spm-packages build
  artifacts:
    paths:
      - build/Build/Products/Debug-iphonesimulator/
    expire_in: 1 week

build:release:
  extends: .macos-job
  stage: build
  script:
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Release -destination 'generic/platform=iOS Simulator' -clonedSourcePackagesDirPath .spm-packages build
  artifacts:
    paths:
      - build/Build/Products/Release-iphonesimulator/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

# ============================================================
# Test Stage
# ============================================================

test:unit:
  extends: .macos-job
  stage: test
  script:
    - xcodebuild -project Vauchi.xcodeproj -scheme Vauchi -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 17 Pro' -clonedSourcePackagesDirPath .spm-packages test
  artifacts:
    reports:
      junit: build/reports/junit.xml
    expire_in: 1 week
  allow_failure: true  # Pre-existing: tests reference APIs not yet in v0.1.x bindings

# ============================================================
# Security Stage
# ============================================================

# GitLab security templates configuration
# Override child analyzer jobs (not parent stubs) to add tags and rules

semgrep-sast:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"


# Swift-specific security analysis
security:swift-analysis:
  extends: .macos-job
  stage: security
  script:
    # Check for common iOS security issues
    - 'grep -r "NSAllowsArbitraryLoads" . && echo "WARNING: App Transport Security disabled" || true'
    - 'grep -r "allowsBackup.*true" . && echo "WARNING: Backup enabled" || true'
    - 'grep -r "NSCameraUsageDescription\|NSPhotoLibraryUsageDescription\|NSLocationWhenInUseUsageDescription" Info.plist || echo "INFO: No privacy permissions declared"'

# Dependency check for CocoaPods/SPM
security:dependencies:
  extends: .macos-job
  stage: security
  script:
    - |
      if [ -f "Podfile.lock" ]; then
        echo "Checking CocoaPods dependencies..."
        pod outdated || true
      fi
    - |
      if [ -f "Package.resolved" ]; then
        echo "Checking Swift Package dependencies..."
        swift package show-dependencies || true
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "Podfile*"
        - "project.yml"
    - if: $CI_COMMIT_BRANCH == "main"
