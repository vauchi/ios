name: Vauchi
options:
  bundleIdPrefix: app.vauchi
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "16.0"

packages:
  VauchiPlatform:
    url: https://gitlab.com/vauchi/vauchi-platform-swift.git
    version: "0.11.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing.git
    from: "1.17.0"

targets:
  Vauchi:
    type: application
    platform: iOS
    sources:
      - path: Vauchi
        excludes:
          - "**/*.xcassets"
          - "Generated"
          - "Libs"
          # CoreUI views that depend on MobileOnboardingWorkflow (UniFFI binding)
          # which isn't in the published VauchiPlatform yet. Exclude until bindings update.
          - "CoreUI/OnboardingViewModel.swift"
          - "CoreUI/CoreOnboardingView.swift"
    dependencies:
      - package: VauchiPlatform
        product: VauchiPlatform
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vauchi.ios
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: L2853TNSJ4
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_ENTITLEMENTS: Vauchi/Vauchi.entitlements
    info:
      path: Vauchi/Info.plist
      properties:
        CFBundleDisplayName: Vauchi
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - vauchi
            CFBundleURLName: app.vauchi.ios
        NSBluetoothAlwaysUsageDescription: "Vauchi uses Bluetooth to exchange contact cards with nearby devices."
        NSCameraUsageDescription: "Vauchi uses the camera to scan QR codes for contact exchange."
        NSMicrophoneUsageDescription: "Vauchi uses the microphone for ultrasonic proximity verification during contact exchange."
        NFCReaderUsageDescription: "Vauchi uses NFC to exchange contact cards with nearby devices."
        com.apple.developer.nfc.readersession.iso7816.select-identifiers:
          - F0564155434849

  VauchiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VauchiTests
    dependencies:
      - target: Vauchi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vauchi.ios.tests
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES

  VauchiSnapshotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VauchiSnapshotTests
    dependencies:
      - target: Vauchi
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vauchi.ios.snapshot-tests
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES

  VauchiUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VauchiUITests
    dependencies:
      - target: Vauchi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vauchi.ios.uitests
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Vauchi:
    build:
      targets:
        Vauchi: all
        VauchiTests: [test]
        VauchiSnapshotTests: [test]
        VauchiUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VauchiTests
        - VauchiSnapshotTests
        - VauchiUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
